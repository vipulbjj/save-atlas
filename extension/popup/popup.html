<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SaveAtlas</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo">
        SaveAtlas <span class="logo-dot"></span>
      </div>
      <div class="status-pill" id="statusPill">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Checking...</span>
      </div>
    </header>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="totalSaves">—</div>
        <div class="stat-label">Total Saves</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="lastSync">—</div>
        <div class="stat-label">Last Sync</div>
      </div>
    </div>

    <div class="sync-section">
      <button class="sync-btn" id="syncBtn">
        <svg id="syncIcon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
        Sync Now
      </button>
      <p class="sync-hint">Or browse Instagram — saves sync automatically.</p>
    </div>

    <div class="message-box" id="messageBox"></div>

    <div class="divider"></div>

    <div class="actions">
      <a href="https://save-atlas.vercel.app/dashboard" target="_blank" class="action-link primary">
        Open Dashboard →
      </a>
      <a href="https://www.instagram.com/your_activity/saved/" target="_blank" class="action-link secondary">
        View Saved on Instagram
      </a>
    </div>

    <div class="auto-badge">
      <span class="auto-dot"></span>
      Auto-sync every 30 min
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
